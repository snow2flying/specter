name: Specter CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  SCCACHE_GHA_ENABLED: "true"

jobs:
  test:
    name: Test (macOS)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check release lockfiles
        run: ./scripts/check-release-lockfiles.sh

      - uses: mozilla-actions/sccache-action@v0.0.9
      - run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-test
          cache-on-failure: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - run: cargo fmt -- --check

      - name: Resolve host target
        run: |
          set -euo pipefail
          if [[ "$(uname -m)" == "arm64" ]]; then
            TARGET=aarch64-apple-darwin
          else
            TARGET=x86_64-apple-darwin
          fi
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: lib/boringssl
          key: boringssl-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install prebuilt BoringSSL
        run: |
          set -euo pipefail
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path Cargo.toml "$TARGET"

      - run: cargo nextest run --all-features --profile ci --locked

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextest-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

      - name: Run examples
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            cargo run --locked --example fingerprint_validation
            cargo run --locked --example protocol_test

  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.9
      - run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-linux-${{ matrix.target }}
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-zigbuild

      - name: Install zig
        run: brew install zig

      - uses: actions/cache@v4
        with:
          path: |
            lib/boringssl/${{ matrix.target }}
            lib/boringssl/include
          key: boringssl-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Install prebuilt BoringSSL
        run: |
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path Cargo.toml "${{ matrix.target }}"

      - name: Build
        run: |
          chmod +x scripts/zig-cc-* scripts/zig-cxx-*
          just zigbuild ${{ matrix.target }}

  build-windows:
    name: Build Windows (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.9
      - run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-windows-${{ matrix.target }}
          cache-on-failure: true

      - name: Install LLVM
        run: brew install llvm

      - name: Add LLVM to PATH
        run: echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin

      - uses: actions/cache@v4
        with:
          path: |
            lib/boringssl/${{ matrix.target }}
            lib/boringssl/include
          key: boringssl-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Install prebuilt BoringSSL
        run: |
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path Cargo.toml "${{ matrix.target }}"

      - name: Build
        run: cargo xwin build --locked --release --target ${{ matrix.target }} --lib
