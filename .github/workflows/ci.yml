name: Specter CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check release lockfiles
        run: ./scripts/check-release-lockfiles.sh

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-test-linux
          cache-on-failure: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - run: cargo fmt -- --check

      - uses: actions/cache@v4
        with:
          path: lib/boringssl
          key: boringssl-x86_64-unknown-linux-gnu-${{ hashFiles('Cargo.lock') }}

      - name: Install prebuilt BoringSSL
        run: |
          set -euo pipefail
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path Cargo.toml x86_64-unknown-linux-gnu

      - run: cargo nextest run --all-features --profile ci --locked

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextest-results-linux
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

      - name: Run examples
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            cargo run --locked --example fingerprint_validation
            cargo run --locked --example protocol_test

  test-macos:
    name: Test (macOS smoke)
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-test-macos
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: actions/cache@v4
        with:
          path: lib/boringssl
          key: boringssl-aarch64-apple-darwin-${{ hashFiles('Cargo.lock') }}

      - name: Install prebuilt BoringSSL
        run: |
          set -euo pipefail
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path Cargo.toml aarch64-apple-darwin

      - name: Darwin smoke (transport-touching binaries + lib unit tests)
        run: |
          cargo nextest run --all-features --profile ci --locked \
            -E 'kind(lib) | binary(/^(h1_|h2_|h3_|websocket_|streaming_|validation_|tls_|connect_|builder_)/)'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextest-results-macos
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  test-windows-smoke:
    name: Test (Windows smoke)
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-test-windows-smoke
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: actions/cache@v4
        with:
          path: |
            lib/boringssl/x86_64-pc-windows-msvc
            lib/boringssl/include
          key: boringssl-x86_64-pc-windows-msvc-${{ hashFiles('Cargo.lock') }}

      - name: Install prebuilt BoringSSL
        run: |
          set -euo pipefail
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path Cargo.toml x86_64-pc-windows-msvc

      - name: Windows smoke (transport-touching integration tests)
        run: |
          cargo nextest run --all-features --profile ci --retries 0 --locked \
            -E 'binary(=h1_rfc_compliance) | binary(=rfc6455_websocket) | binary(=rfc8441_handshake) | binary(=h3_native_codec)'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextest-results-windows-smoke
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  build-linux:
    name: Build Linux (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-build-${{ matrix.target }}
          cache-on-failure: true

      - uses: actions/cache@v4
        with:
          path: |
            lib/boringssl/${{ matrix.target }}
            lib/boringssl/include
          key: boringssl-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Install prebuilt BoringSSL
        run: |
          set -euo pipefail
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path Cargo.toml "${{ matrix.target }}"

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }} --lib

  build-windows:
    name: Build Windows (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            run_test: true
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            run_test: false
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-build-${{ matrix.target }}
          cache-on-failure: true

      - uses: actions/cache@v4
        with:
          path: |
            lib/boringssl/${{ matrix.target }}
            lib/boringssl/include
          key: boringssl-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Install prebuilt BoringSSL
        run: |
          set -euo pipefail
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path Cargo.toml "${{ matrix.target }}"

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }} --lib

      - name: Smoke test (native arch only)
        if: matrix.run_test
        run: cargo test --lib --locked --target ${{ matrix.target }}
