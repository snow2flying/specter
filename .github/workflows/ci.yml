name: Specter CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  SCCACHE_GHA_ENABLED: "true"

jobs:
  test:
    name: Test (macOS)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: mozilla-actions/sccache-action@v0.0.9
      - run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - run: cargo fmt -- --check

      - name: Install BoringSSL build tools
        run: brew install cmake ninja

      - name: Build prebuilt BoringSSL
        run: |
          set -euo pipefail
          if [[ "$(uname -m)" == "arm64" ]]; then
            TARGET=aarch64-apple-darwin
          else
            TARGET=x86_64-apple-darwin
          fi
          cargo fetch --manifest-path Cargo.toml
          chmod +x scripts/build-boringssl.sh
          ./scripts/build-boringssl.sh --manifest-path Cargo.toml "$TARGET"
          test -s "lib/boringssl/include/openssl/x509v3.h"
          test -s "lib/boringssl/$TARGET/build/libssl.a"
          echo "BORING_BSSL_PATH=${{ github.workspace }}/lib/boringssl/$TARGET/build" >> "$GITHUB_ENV"
          echo "BORING_BSSL_INCLUDE_PATH=${{ github.workspace }}/lib/boringssl/include" >> "$GITHUB_ENV"

      - run: cargo nextest run --all-features --profile ci

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nextest-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

      - name: Run examples
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            cargo run --example fingerprint_validation
            cargo run --example protocol_test

  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-zigbuild

      - name: Install zig
        run: brew install zig

      - name: Build
        run: |
          chmod +x scripts/zig-cc-* scripts/zig-cxx-*
          just zigbuild ${{ matrix.target }}

  build-windows:
    name: Build Windows (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install LLVM and BoringSSL build tools
        run: brew install llvm cmake ninja

      - name: Add LLVM to PATH
        run: echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin

      - name: Build
        run: |
          set -euo pipefail
          . "$GITHUB_WORKSPACE/scripts/lib-bssl-env.sh" "${{ matrix.target }}"
          cargo xwin build --release --target ${{ matrix.target }} --lib
