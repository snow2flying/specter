name: GitHub Release

on:
  workflow_run:
    workflows: ['Node Release', 'Python Release']
    types: [completed]

permissions:
  actions: read
  contents: write

jobs:
  release:
    name: Create GitHub release
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Verify package release workflows passed
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          git fetch --tags --force
          tag="$(git tag --points-at "$HEAD_SHA" --list 'v*' | sort -V | tail -1)"
          if [[ -z "$tag" ]]; then
            echo "No v* tag points at $HEAD_SHA" >&2
            exit 1
          fi

          for workflow in "Node Release" "Python Release"; do
            run_id="$(
              gh run list \
                --workflow "$workflow" \
                --commit "$HEAD_SHA" \
                --event push \
                --json databaseId,status,conclusion \
                --jq '[.[] | select(.status == "completed" and .conclusion == "success")] | .[0].databaseId // ""'
            )"
            if [[ -z "$run_id" ]]; then
              echo "$workflow has not completed successfully for $tag ($HEAD_SHA); waiting for the paired workflow_run event"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "$workflow succeeded in run $run_id"
          done

          version="${tag#v}"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { emit = 1; next }
            emit && /^## \[/ { exit }
            emit { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "No CHANGELOG.md notes found for $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.release.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists"
            exit 0
          fi

          gh release create "$TAG" \
            --verify-tag \
            --latest \
            --title "$TAG" \
            --notes-file release-notes.md
