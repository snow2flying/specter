name: Python Release

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'bindings/python/**'
      - '.github/workflows/python-release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-14
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install prebuilt BoringSSL for ${{ matrix.target }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path bindings/python/Cargo.toml "${{ matrix.target }}"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml
        env:
          # Use prebuilt BoringSSL from repo
          BORING_BSSL_PATH: ${{ github.workspace }}/lib/boringssl/${{ matrix.target }}/build
          BORING_BSSL_INCLUDE_PATH: ${{ github.workspace }}/lib/boringssl/include
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install prebuilt BoringSSL for aarch64-apple-darwin
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path bindings/python/Cargo.toml aarch64-apple-darwin
      # maturin develop requires a virtualenv - create one explicitly
      - name: Create virtualenv and install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install maturin pytest pytest-asyncio
      - name: Build and install (maturin develop)
        run: |
          . .venv/bin/activate
          maturin develop --release -m bindings/python/Cargo.toml
        env:
          # Use prebuilt BoringSSL from repo
          BORING_BSSL_PATH: ${{ github.workspace }}/lib/boringssl/aarch64-apple-darwin/build
          BORING_BSSL_INCLUDE_PATH: ${{ github.workspace }}/lib/boringssl/include
      - name: Run tests
        run: |
          . .venv/bin/activate
          cd bindings/python
          pytest tests/ -v

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [macos, sdist, test]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          # Falls back to token if Trusted Publishing not configured
          password: ${{ secrets.PYPI_API_TOKEN }}
