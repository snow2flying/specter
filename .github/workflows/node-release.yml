name: Node Release

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'bindings/node/**'
      - '.github/workflows/node-release.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-14
            target: aarch64-apple-darwin
          - host: macos-14
            target: x86_64-apple-darwin
          - host: macos-14
            target: x86_64-unknown-linux-gnu
          - host: macos-14
            target: aarch64-unknown-linux-gnu
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bindings/node/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: mozilla-actions/sccache-action@v0.0.9
      - run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: node-build-${{ matrix.settings.target }}
          cache-on-failure: true

      - name: Install Linux cross-compilation tools
        if: contains(matrix.settings.target, 'unknown-linux')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install Zig
        if: contains(matrix.settings.target, 'unknown-linux')
        run: brew install zig

      - uses: actions/cache@v4
        with:
          path: |
            lib/boringssl/${{ matrix.settings.target }}
            lib/boringssl/include
          key: boringssl-node-${{ matrix.settings.target }}-${{ hashFiles('Cargo.lock', 'bindings/node/Cargo.toml') }}

      - name: Install prebuilt BoringSSL for ${{ matrix.settings.target }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path bindings/node/Cargo.toml "${{ matrix.settings.target }}"
          find "lib/boringssl/${{ matrix.settings.target }}/build" -maxdepth 1 -type f | head -10
          find lib/boringssl/include/openssl -maxdepth 1 -type f | head -10

      - name: Install dependencies
        run: |
          cd bindings/node
          npm install

      - name: Build
        run: |
          set -euo pipefail
          TARGET="${{ matrix.settings.target }}"
          cd bindings/node

          if [[ "$TARGET" == *"unknown-linux"* ]]; then
            chmod +x ../../scripts/zig-cc-* ../../scripts/zig-cxx-*

            case "$TARGET" in
              aarch64-unknown-linux-gnu)
                export CC="$GITHUB_WORKSPACE/scripts/zig-cc-aarch64-linux-gnu"
                export CXX="$GITHUB_WORKSPACE/scripts/zig-cxx-aarch64-linux-gnu"
                ;;
              x86_64-unknown-linux-gnu)
                export CC="$GITHUB_WORKSPACE/scripts/zig-cc-x86_64-linux-gnu"
                export CXX="$GITHUB_WORKSPACE/scripts/zig-cxx-x86_64-linux-gnu"
                ;;
            esac

            export "CC_${TARGET//-/_}=$CC"
            export "CXX_${TARGET//-/_}=$CXX"
            export "AR_${TARGET//-/_}=ar"

            npm run build -- --target "$TARGET" --cross-compile
          elif [[ "$TARGET" == "aarch64-apple-darwin" ]]; then
            npm run build
          else
            npm run build -- --target "$TARGET"
          fi
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'
          BORING_BSSL_PATH: ${{ github.workspace }}/lib/boringssl/${{ matrix.settings.target }}/build
          BORING_BSSL_INCLUDE_PATH: ${{ github.workspace }}/lib/boringssl/include

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  test:
    name: Test bindings
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bindings/node/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9
      - run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: node-test-aarch64-apple-darwin
          cache-on-failure: true

      - uses: actions/cache@v4
        with:
          path: |
            lib/boringssl/aarch64-apple-darwin
            lib/boringssl/include
          key: boringssl-node-aarch64-apple-darwin-${{ hashFiles('Cargo.lock', 'bindings/node/Cargo.toml') }}

      - name: Install prebuilt BoringSSL for aarch64-apple-darwin
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path bindings/node/Cargo.toml aarch64-apple-darwin

      - name: Install dependencies
        run: |
          cd bindings/node
          npm install

      - name: Build
        run: |
          cd bindings/node
          npm run build:debug
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'
          # Use prebuilt BoringSSL from repo
          BORING_BSSL_PATH: ${{ github.workspace }}/lib/boringssl/aarch64-apple-darwin/build
          BORING_BSSL_INCLUDE_PATH: ${{ github.workspace }}/lib/boringssl/include

      - name: Test
        run: |
          cd bindings/node
          npm test

  publish:
    name: Publish to npm
    needs: [build, test]
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          cd bindings/node
          npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bindings/node/artifacts
          pattern: bindings-*

      - name: Stage native packages
        run: |
          cd bindings/node
          npm run create:npm-dirs
          npm run artifacts
          find npm -maxdepth 2 -type f | sort

      - name: Publish
        run: |
          cd bindings/node
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
