name: Node Release

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'bindings/node/**'
      - '.github/workflows/node-release.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  preflight:
    name: Release lockfile preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check release lockfiles
        run: ./scripts/check-release-lockfiles.sh

  build:
    needs: preflight
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-14
            target: aarch64-apple-darwin
            deployment_target: '11.0'
          - host: macos-14
            target: x86_64-apple-darwin
            deployment_target: '10.13'
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bindings/node/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: node-build-${{ matrix.target }}
          cache-on-failure: true

      - uses: actions/cache@v4
        with:
          path: |
            lib/boringssl/${{ matrix.target }}
            lib/boringssl/include
          key: boringssl-node-${{ matrix.target }}-${{ hashFiles('Cargo.lock', 'bindings/node/Cargo.toml') }}

      - name: Install prebuilt BoringSSL for ${{ matrix.target }}
        run: |
          set -euo pipefail
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path bindings/node/Cargo.toml "${{ matrix.target }}"
          find "lib/boringssl/${{ matrix.target }}/build" -maxdepth 1 -type f | head -10
          find lib/boringssl/include/openssl -maxdepth 1 -type f | head -10

      - name: Install node deps
        run: |
          cd bindings/node
          npm install

      - name: Build
        working-directory: bindings/node
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          if [[ "$TARGET" == "aarch64-apple-darwin" ]]; then
            npm run build
          else
            npm run build -- --target "$TARGET"
          fi
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
          BORING_BSSL_PATH: ${{ github.workspace }}/lib/boringssl/${{ matrix.target }}/build
          BORING_BSSL_INCLUDE_PATH: ${{ github.workspace }}/lib/boringssl/include
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  test:
    name: Test bindings (macOS)
    needs: preflight
    timeout-minutes: 20
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bindings/node/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: node-test-aarch64-apple-darwin
          cache-on-failure: true

      - uses: actions/cache@v4
        with:
          path: |
            lib/boringssl/aarch64-apple-darwin
            lib/boringssl/include
          key: boringssl-node-aarch64-apple-darwin-${{ hashFiles('Cargo.lock', 'bindings/node/Cargo.toml') }}

      - name: Install prebuilt BoringSSL for aarch64-apple-darwin
        run: |
          set -euo pipefail
          chmod +x scripts/install-boringssl-prebuilt.sh
          ./scripts/install-boringssl-prebuilt.sh --manifest-path bindings/node/Cargo.toml aarch64-apple-darwin

      - name: Install dependencies
        run: |
          cd bindings/node
          npm install

      - name: Build
        run: |
          cd bindings/node
          npm run build:debug
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
          BORING_BSSL_PATH: ${{ github.workspace }}/lib/boringssl/aarch64-apple-darwin/build
          BORING_BSSL_INCLUDE_PATH: ${{ github.workspace }}/lib/boringssl/include

      - name: Test
        run: |
          cd bindings/node
          npx jest --ci --runInBand --no-watchman --detectOpenHandles --openHandlesTimeout=1000 --forceExit

  test-linux:
    name: Test bindings (Linux ${{ matrix.target }})
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: specter.linux-x64-gnu.node
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: specter.linux-arm64-gnu.node
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download bindings artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: bindings/node

      - name: Verify artifact landed where expected
        working-directory: bindings/node
        run: |
          ls -la ./*.node
          test -f "${{ matrix.binary }}"

      - name: Install with no optionals (prevents registry fallback masking failure)
        working-directory: bindings/node
        run: npm install --omit=dev --omit=optional --ignore-scripts

      - name: Install jest only
        working-directory: bindings/node
        run: npm install --no-save jest@^29.7.0

      - name: Direct binary load smoke
        working-directory: bindings/node
        run: node -e "require('./${{ matrix.binary }}')"

      - name: Run jest against the local binary
        working-directory: bindings/node
        env:
          NODE_ENV: test
        run: npx jest --ci --runInBand --no-watchman --detectOpenHandles --openHandlesTimeout=1000 --forceExit

  publish:
    name: Publish to npm
    needs: [build, test, test-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          cd bindings/node
          npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bindings/node/artifacts
          pattern: bindings-*

      - name: Stage native packages
        run: |
          cd bindings/node
          npm run create:npm-dirs
          npm run artifacts
          find npm -maxdepth 2 -type f | sort

      - name: Verify staged npm packages
        working-directory: bindings/node
        run: |
          set -euo pipefail
          npm pack --dry-run
          for package_json in npm/*/package.json; do
            package_dir="$(dirname "$package_json")"
            binary="$(node -p "require('./${package_json}').main")"
            test -f "${package_dir}/${binary}"
            (cd "$package_dir" && npm pack --dry-run)
          done

      - name: Publish
        run: |
          cd bindings/node
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
