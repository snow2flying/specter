# Cargo configuration for specter
# Uses prebuilt BoringSSL libraries from lib/boringssl/

# Note: Environment variables for boring-sys are set via:
# - Local dev: source scripts/env.sh
# - CI: Set BORING_BSSL_PATH and BORING_BSSL_INCLUDE_PATH in workflow

# Local inner-loop only (.cargo/ is excluded from cargo publish). Overrides the
# global ~/.cargo/config.toml sccache wrapper so profile.incremental can work.
# CI keeps its own sccache setup in .github/workflows/.

[build]
rustc-wrapper = ""
incremental = true

[env]
CARGO_INCREMENTAL = { value = "1", force = true }
RUSTC_WRAPPER = { value = "", force = true }

# Target-specific linker settings for cross-compilation
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"

# Skip macOS ld string-table dedup on debug links. 2-3x faster relink of the 75
# integration test binaries; no effect on runtime behavior or release builds
# (which target Linux via zigbuild).
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-no_deduplicate"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-no_deduplicate"]
